<footer class="footer">
  <!-- {%- include social.html -%} -->
  <div class="footer__email-box">
    <label class="footer__email-box__title"> Get interesting news </label>
    <br />
    <label class="footer__email-box__desc">
      Subscribe to our newsletter and we’ll send you the emails of latest posts.
    </label>
    <br />
    <input type="text" class="footer__email-box__email-input" />
    <button class="footer__email-box__submit">보내기</button>
    <br />
  </div>
  <a
    class="footer__social-icon"
    href="https://github.com/{{ site.github_username| cgi_escape | escape }}"
    target="_blank"
  >
    <svg class="footer__social-icon__github-icon">
      <use
        xlink:href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"
      ></use>
    </svg>
  </a>
</footer>
